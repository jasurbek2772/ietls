<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Reading Challenge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --primary-color: #3182ce;
            --success-color: #48bb78;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 колонки */
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .day-card {
            aspect-ratio: 1/1;
            background: #edf2f7;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        .day-card:active { transform: scale(0.9); }

        /* Стиль для пройденного дня */
        .day-card.completed {
            background-color: var(--success-color);
            color: white;
            box-shadow: 0 4px 10px rgba(72, 187, 120, 0.3);
        }

        /* Стиль для текущего/выбранного дня */
        .day-card.active {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        #status { margin-top: 20px; font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>

    <h1>🚀 IELTS 30-Day Reading</h1>
    
    <div class="grid" id="grid">
        </div>

    <p id="status">Loading progress...</p>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || 12345; // Если открыто не в ТГ, используем тестовый ID
        const API_URL = "http://127.0.0.1:8000"; // Твой локальный FastAPI

        tg.expand(); // Расширить на весь экран

        // Функция загрузки прогресса из БД
        async function loadProgress() {
            try {
                const response = await fetch(`${API_URL}/progress/${userId}`);
                const data = await response.json();
                renderGrid(data.completed);
                document.getElementById('status').innerText = `Completed: ${data.completed.length} / 30 days`;
            } catch (e) {
                console.error("API Error:", e);
                renderGrid([]); // Если сервер не отвечает, рисуем пустую сетку
                document.getElementById('status').innerText = "Offline Mode (Server not found)";
            }
        }

        // Функция отрисовки сетки
        function renderGrid(completedDays) {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; // Очистить

            for (let i = 1; i <= 30; i++) {
                const card = document.createElement('div');
                card.className = 'day-card';
                if (completedDays.includes(i)) card.classList.add('completed');
                card.innerText = i;

                card.onclick = () => handleDayClick(i);
                grid.appendChild(card);
            }
        }

        // Клик по дню
        async function handleDayClick(day) {
            // 1. Отправляем запрос на сервер, чтобы сохранить прогресс
            try {
                await fetch(`${API_URL}/complete/${userId}/${day}`, { method: 'POST' });
            } catch (e) { console.error("Could not save progress"); }

            // 2. Открываем ссылку на задание (пример ссылок из твоего сообщения)
            // Здесь можно сделать массив ссылок, но для теста просто откроем одну:
            const taskLink = "https://t.me/c/1808312605/6"; 
            
            // В Telegram Mini App лучше использовать tg.openLink
            tg.openLink(taskLink);

            // Перерисовываем сетку, чтобы день стал зеленым
            loadProgress();
        }

        // Запуск при загрузке страницы
        loadProgress();
    </script>
</body>
</html>
