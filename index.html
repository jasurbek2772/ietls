<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Challenge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --primary-color: #3182ce;
            --success-color: #48bb78;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Сетка дней */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px; width: 100%; max-width: 400px;
        }

        .day-card {
            aspect-ratio: 1/1; background: #edf2f7; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }

        .day-card.completed { background-color: var(--success-color); color: white; }

        /* Модальное окно (Инфо-панель) */
        #details-panel {
            display: none; /* По умолчанию скрыто */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--tg-theme-bg-color);
            z-index: 100; padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }

        .close-btn {
            background: #e2e8f0; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; margin-bottom: 20px;
        }

        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin-bottom: 20px; }
        
        .file-link {
            display: block; background: #3182ce; color: white;
            padding: 15px; border-radius: 10px; text-decoration: none;
            margin-bottom: 10px; text-align: center; font-weight: bold;
        }

        #status { margin-top: 20px; opacity: 0.7; }
    </style>
</head>
<body>

    <h1>🚀 IELTS 30-Day Reading</h1>
    <div class="grid" id="grid"></div>
    <p id="status">Loading...</p>

    <div id="details-panel">
        <button class="close-btn" onclick="closePanel()">← Назад</button>
        <h2 id="panel-title">Day 1</h2>
        
        <div id="video-content">
            </div>

        <div id="files-content">
            </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || 12345;
        const API_URL = "https://fastapi.nomadhost.xyz";

        // ДАННЫЕ ДЛЯ КАЖДОГО ДНЯ
        const dayContent = {
            1: {
                video: "https://www.youtube.com/embed/dQw4w9WgXcQ", // Пример видео
                files: [
                    { name: "📄 Reading Passage (PDF)", url: "https://example.com/day1-task.pdf" },
                    { name: "📝 Vocabulary List", url: "https://example.com/day1-voc.pdf" }
                ]
            },
            2: {
                video: "https://www.youtube.com/embed/another-video",
                files: [
                    { name: "📄 Day 2 Task", url: "#" },
                    { name: "📝 Answers", url: "#" }
                ]
            }
            // Добавь остальные дни по аналогии
        };

        async function loadProgress() {
            try {
                const response = await fetch(`${API_URL}/progress/${userId}`);
                const data = await response.json();
                renderGrid(data.completed);
                document.getElementById('status').innerText = `Completed: ${data.completed.length} / 30 days`;
            } catch (e) { console.error(e); }
        }

        function renderGrid(completedDays) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 30; i++) {
                const card = document.createElement('div');
                card.className = 'day-card' + (completedDays.includes(i) ? ' completed' : '');
                card.innerText = i;
                card.onclick = () => showDayDetails(i);
                grid.appendChild(card);
            }
        }

        // Открытие панели
        async function showDayDetails(day) {
            const content = dayContent[day];
            if (!content) {
                alert("Контент для этого дня еще не загружен!");
                return;
            }

            // Заполняем данные
            document.getElementById('panel-title').innerText = `Day ${day} Content`;
            
            // Видео
            document.getElementById('video-content').innerHTML = `
                <iframe class="video-container" src="${content.video}" frameborder="0" allowfullscreen></iframe>
            `;

            // Файлы
            let filesHtml = '';
            content.files.forEach(file => {
                filesHtml += `<a href="${file.url}" class="file-link" target="_blank">${file.name}</a>`;
            });
            document.getElementById('files-content').innerHTML = filesHtml;

            // Показываем панель
            document.getElementById('details-panel').style.display = 'block';

            // Отмечаем как выполненное в базе
            try {
                await fetch(`${API_URL}/complete/${userId}/${day}`, { method: 'POST' });
                loadProgress(); // Обновляем сетку на фоне
            } catch (e) { console.error(e); }
        }

        function closePanel() {
            document.getElementById('details-panel').style.display = 'none';
            document.getElementById('video-content').innerHTML = ''; // Останавливаем видео при закрытии
        }

        tg.expand();
        loadProgress();
    </script>
</body>
</html>
